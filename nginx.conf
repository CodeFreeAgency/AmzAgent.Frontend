# Example Nginx config for the built SPA (dist/).
# Point `root` at your deployed dist folder, then reload nginx.

server {
    listen 80;
    server_name demo.sellingpartnerservices.com;
    root /var/www/fulfilment-agent/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
